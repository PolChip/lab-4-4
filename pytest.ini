[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term
    --cov-report=html
    --cov-fail-under=80

markers =
    unit: Unit tests for isolated components
    integration: Integration tests for component interaction